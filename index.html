<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TITLE -->
    <title>Login</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/png" href="images (5).png">

    <!-- BOOTSTRAP LINK -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- STYLE -->
    <style>
        /* Style for body */
        body{
            font-family: sans-serif;
            margin-top: 100px;
            background-color: lightsteelblue;
        }

        /* Style for container */
        .container{
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 25px;
            border: none;
            padding: 20px;
            width: 300px;
            margin: auto;
        }

        /* Style for input */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 5px 10px;
            margin: 5px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
            border-radius: 15px;
            text-align: center;
        }

        /* Style for button */
        input[type="submit"] {
            background-color: lightslategray;
            color: white;
            padding: 5px;
            border-radius: 10px;
            border: none;
            width: 100%;
        }

        /* Style for output */
        output{
            margin-top: 15px;
            text-align: left;
        }

        /* Label */
        label {
            display: block;
            margin-top: 10px;
        }
        
    </style>

</head>
<body>

    <!-- BOX -->
    <div class="container">

        <!-- Logo -->
            <a href="file:///C:/Users/nahar/OneDrive/Documents/Desktop/LP_ICT9Ruby_Q4SW1_Na_Hahyun/images%20(5).png" target="_blank">
                <img src="images (5).png" alt="logo" height=60px style="display: block; margin: auto;">
            </a>

        <!-- LOGIN HEADING -->
        <h4><center><b>Login</b></center></h4>
    
        <!-- WHOLE FORM -->
        <form onsubmit="authenticate(event)">

            <!-- USERNAME -->
            <label for="username" style="text-align: center; font-weight: bold;">Username</label>
            <input type="text" id="UID" placeholder="Enter Username" required>

            <!-- PASSWORD -->
            <label for="password" style="text-align: center; font-weight: bold;">Password</label>
            <input type="password" id="PW" placeholder="Enter Password" required>

            <!-- CHECK BOX FOR TOGGLE (STAY LOGGED IN) -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="stayLoggedIn" onclick="toggleStay()">
                    <label class="form-check-label">
                        <p>Stay logged in</p>
                    </label>
                </div>

            <!-- HIDDEN DETAILS -->
            <div id="stayDetails" style="display:none;" class="mt-2">
            <p class="note" style="color: #6d6d6d;"><i>Your session will stay active on this device.</i></p>
            </div>
            
            <!-- SUBMIT BTN -->
            <input type="submit" value="Login" id="Submit">

            <!-- Result Display -->
            <div class="result">
                <p id="displayattempts"></p>
            </div>

            <!-- SPACE -->
            <br>

            <!-- EXAMPLE LINK -->
            <center><a href="https://obmontessorilaspinas.orangeapps.ph/oa_school/" target="_self">Forgot username / password?</a></center>
        </form>
    
    </div>

    <script>

        let attempts = 0; 
        const maxAttempts = 3;

        function authenticate(event) {
            event.preventDefault(); // stop reload

            var username = document.getElementById("UID").value;
            var password = document.getElementById("PW").value;

            if (username === "student01" && password === "12345678") {
                alert("Login successful! Welcome, " + username + "!");
                window.location.href = "notebooks.html";
            } else {
                attempts++; // increase attempts

                let remaining = maxAttempts - attempts;

                alert("Incorrect username or password!");

                // display attempts
                document.getElementById("displayattempts").innerHTML =
                    "⚠ Attempts left: " + remaining;

                if (attempts >= maxAttempts) {
                    alert("Too many failed attempts. Login disabled.");
                    document.getElementById("Submit").disabled = true;

                    document.getElementById("displayattempts").innerHTML =
                        "❌ Maximum attempts reached.";
                }
            }
        }

        function toggleStay() {
            let cb = document.getElementById("stayLoggedIn");
            document.getElementById("stayDetails").style.display = cb.checked ? "block" : "none";
        }

    </script>
    
    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
